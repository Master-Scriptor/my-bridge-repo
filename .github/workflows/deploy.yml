name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # Or 'master' if your default branch is master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # You can use a recent Node.js version

      - name: Install dependencies and build
        run: |
          npm install -g serve # Install serve globally to host the static files
          # If you have a build process (like React, Vue, etc.), run it here.
          # For a simple HTML/JS, we don't need a build step, just serve.
          # Example for a build process:
          # npm install
          # npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # Set this to your build output directory if you have one, otherwise use './' for current dir
          # If you have a build step that creates a dist/ or build/ folder, change publish_dir to './build' or './dist'
